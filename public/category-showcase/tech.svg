<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LiveDrop Tech Category</title>
  <desc id="desc">A technology themed category banner with modern device silhouettes.</desc>
  <defs>
    <linearGradient id="bgTech" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E7F0FF"/>
      <stop offset="50%" stop-color="#DDE8FF"/>
      <stop offset="100%" stop-color="#D2E4FF"/>
    </linearGradient>
    <linearGradient id="dev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A5BFF"/>
      <stop offset="100%" stop-color="#2ABEFF"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgTech)"/>
  <rect x="180" y="170" width="910" height="500" rx="44" fill="#FFFFFF" fill-opacity="0.92"/>
  <rect x="260" y="245" width="600" height="340" rx="28" fill="url(#dev)"/>
  <rect x="310" y="285" width="500" height="240" rx="18" fill="#EEF3FF"/>
  <rect x="430" y="600" width="250" height="22" rx="10" fill="#90A5D6"/>
  <rect x="1080" y="270" width="290" height="420" rx="42" fill="#FFFFFF" fill-opacity="0.95"/>
  <rect x="1125" y="335" width="200" height="250" rx="26" fill="#EAF2FF"/>
  <circle cx="1225" cy="617" r="16" fill="#93A7D6"/>

  <g font-family="Inter, Arial, sans-serif" fill="#1E315F">
    <text x="180" y="760" font-size="44" font-weight="800">TECH DROPS</text>
    <text x="180" y="805" font-size="26" opacity="0.72">Smart devices, performance hardware, and daily tech upgrades.</text>
  </g>
</svg>
