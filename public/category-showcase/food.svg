<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LiveDrop Food Category</title>
  <desc id="desc">A food themed category banner with modern culinary and delivery-inspired visuals.</desc>
  <defs>
    <linearGradient id="bgFood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1E7"/>
      <stop offset="52%" stop-color="#FFEDE2"/>
      <stop offset="100%" stop-color="#FDE7EF"/>
    </linearGradient>
    <linearGradient id="dish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7D61FF"/>
      <stop offset="100%" stop-color="#37B6FF"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgFood)"/>
  <rect x="210" y="180" width="1180" height="510" rx="44" fill="#FFFFFF" fill-opacity="0.93"/>

  <circle cx="560" cy="430" r="165" fill="url(#dish)"/>
  <circle cx="560" cy="430" r="105" fill="#EAF3FF"/>
  <rect x="760" y="280" width="470" height="330" rx="34" fill="#F7F9FF"/>
  <rect x="835" y="350" width="320" height="24" rx="12" fill="#B5C4E5"/>
  <rect x="835" y="395" width="250" height="20" rx="10" fill="#C5D2EC"/>
  <rect x="835" y="438" width="210" height="20" rx="10" fill="#D0DCF1"/>
  <rect x="835" y="490" width="355" height="24" rx="12" fill="#B5C4E5"/>

  <g font-family="Inter, Arial, sans-serif" fill="#2A315B">
    <text x="210" y="760" font-size="44" font-weight="800">FOOD SAVINGS</text>
    <text x="210" y="805" font-size="26" opacity="0.72">Dining, groceries, and quick-bite deals curated for daily value.</text>
  </g>
</svg>
