      <stop offset="0%" stop-color="#F3EEFF"/>
      <stop offset="55%" stop-color="#EEE7FF"/>
      <stop offset="100%" stop-color="#E6E4FF"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A6BFF"/>
      <stop offset="100%" stop-color="#4EA8FF"/>
