<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LiveDrop Digital Category</title>
  <desc id="desc">A digital themed category banner with abstract spark and interface motifs.</desc>
